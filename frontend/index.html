<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Gerador de PPCs</title>
</head>

<body>
    <header>
        <img src="image 3.png" alt="logo IFPE">
        <h1>Gerador de PPCs</h1>
    </header>

    <main>
        <form action="" method="post" class="campo_login_senha">
            <div class="campo_email">
                <label for="email_usuario">Digite seu email:</label>
                <input type="email" name="email_usuario" required>
            </div>

            <div class="campo_senha">
                <label for="senha_usuario">Digite sua senha:</label>
                <input type="password" name="senha_usuario" required>
            </div>

            <button type="submit" name="botao_entrar">ENTRAR</button>
            <a href="#" id="esqueceu_a_senha">ESQUECI MINHA SENHA</a>
        </form>
    </main>
</body>
</html>
